<h2>编辑器按钮怎么放？</h2>
<p class="subtitle">现在有图片和视频两个上传按钮</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>A：并排按钮</h3>
      <div style="padding:1rem">
        <div style="display:flex;gap:8px;align-items:center">
          <div style="border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:.85rem;cursor:pointer">📷 上传图片</div>
          <div style="border:1px solid var(--primary);border-radius:6px;padding:6px 12px;font-size:.85rem;color:var(--primary);cursor:pointer">🎬 上传视频</div>
        </div>
      </div>
      <p>两个按钮并排放，各自独立，简单直观</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>B：合并上传按钮</h3>
      <div style="padding:1rem">
        <div style="display:flex;gap:8px;align-items:center">
          <div style="border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:4px">
            📎 上传文件
            <span style="font-size:.65rem;opacity:.6">▼</span>
          </div>
        </div>
        <div style="margin-top:8px;border:1px solid var(--border);border-radius:6px;padding:4px 0;width:160px;background:var(--bg-card)">
          <div style="padding:6px 12px;cursor:pointer;font-size:.85rem">📷 图片</div>
          <div style="padding:6px 12px;cursor:pointer;font-size:.85rem;background:var(--bg)">🎬 视频</div>
        </div>
      </div>
      <p>一个「上传文件」按钮，展开下拉菜单选择类型，更紧凑</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>C：工具栏区域</h3>
      <div style="padding:1rem">
        <div style="border:1px solid var(--border);border-radius:8px 8px 0 0;padding:8px 12px;display:flex;gap:4px;background:var(--bg);border-bottom:none">
          <div style="padding:4px 8px;border-radius:4px;font-size:.8rem">B</div>
          <div style="padding:4px 8px;border-radius:4px;font-size:.8rem"><i>I</i></div>
          <div style="padding:4px 8px;border-radius:4px;font-size:.8rem"><u>U</u></div>
          <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
          <div style="padding:4px 8px;border-radius:4px;font-size:.85rem;background:var(--primary);color:white">📷</div>
          <div style="padding:4px 8px;border-radius:4px;font-size:.85rem;background:var(--primary);color:white">🎬</div>
        </div>
        <div style="border:1px solid var(--border);padding:24px 12px;border-radius:0 0 8px 8px;background:var(--bg-card);min-height:100px">
          <div style="color:var(--text-muted);font-size:.85rem;text-align:center">在这里写 Markdown 内容...</div>
        </div>
      </div>
      <p>图片和视频按钮固定在工具栏顶部，跟 Markdown 编辑区分开</p>
    </div>
  </div>
</div>

<p style="margin-top:2rem;font-size:.9rem;color:var(--text-muted)">选好后在终端告诉我</p>
