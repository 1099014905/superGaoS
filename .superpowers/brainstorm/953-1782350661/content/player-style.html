<h2>文章里的视频播放器，哪种风格？</h2>
<p class="subtitle">视频在文章详情报渲染为视频播放器</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>A：原生极简</h3>
      <div style="padding:1rem">
        <div style="background:#1a1a2e;border-radius:8px;padding:48px 16px;text-align:center;color:white">
          <div style="font-size:3rem;margin-bottom:8px">▶</div>
          <div style="font-size:.8rem;opacity:.6">HTML5 原生播放器</div>
        </div>
      </div>
      <p>使用浏览器原生 <code>&lt;video controls&gt;</code>，零依赖</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>B：自定义皮肤</h3>
      <div style="padding:1rem">
        <div style="background:#0f0f23;border-radius:8px;overflow:hidden">
          <div style="padding:48px 16px;text-align:center;color:white">
            <div style="font-size:2rem">▶</div>
          </div>
          <div style="background:#1e1e3a;padding:8px 12px;display:flex;align-items:center;gap:8px">
            <span style="color:white;font-size:.8rem">▶ ⏸</span>
            <div style="flex:1;height:4px;background:#333;border-radius:2px">
              <div style="width:30%;background:var(--primary);height:100%;border-radius:2px"></div>
            </div>
            <span style="color:white;font-size:.7rem;opacity:.7">HD</span>
            <span style="color:white;font-size:.7rem;opacity:.7">1:23 / 5:45</span>
            <span style="color:white;font-size:.8rem">⋮</span>
          </div>
        </div>
      </div>
      <p>深色自定义控制栏，跟博客主题风格统一，显示进度、时长、清晰度</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>C：封面 + 点击播放</h3>
      <div style="padding:1rem">
        <div style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px;padding:48px 16px;text-align:center;color:white;position:relative;cursor:pointer">
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
            <div style="font-size:1.5rem">▶</div>
          </div>
          <div style="font-size:.7rem;opacity:.7;position:absolute;bottom:8px;right:12px">05:45</div>
        </div>
      </div>
      <p>点击前显示封面图（可提取视频首帧），点击后全宽播放，类似 YouTube</p>
    </div>
  </div>
</div>

<p style="margin-top:2rem;font-size:.9rem;color:var(--text-muted)">选好后在终端告诉我</p>
