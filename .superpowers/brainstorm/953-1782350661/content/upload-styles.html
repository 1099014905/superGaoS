<h2>上传进度条样式，你喜欢哪种？</h2>
<p class="subtitle">选择你最喜欢的上传交互样式</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>A：简洁条状</h3>
      <div style="padding: 1rem;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <span>🎬 demo.mp4</span>
          <span style="font-size:.8rem;color:var(--primary)">上传中…</span>
        </div>
        <div style="background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden">
          <div style="width:72%;background:var(--primary);height:100%;border-radius:4px;transition:width .3s"></div>
        </div>
        <div style="text-align:right;font-size:.8rem;color:var(--text-muted);margin-top:4px">72%</div>
      </div>
      <p>简单的彩色条形 + 百分比数字，轻量不占空间</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>B：详细信息型</h3>
      <div style="padding:1rem;border:1px solid var(--border);border-radius:8px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="font-size:2rem">🎬</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:.9rem">demo.mp4</div>
            <div style="font-size:.75rem;color:var(--text-muted)">45.2 MB / 62.8 MB</div>
          </div>
          <div style="font-size:.8rem;font-weight:600;color:var(--primary)">72%</div>
        </div>
        <div style="background:#e2e8f0;border-radius:8px;height:12px;overflow:hidden">
          <div style="width:72%;background:linear-gradient(90deg,var(--primary),#818cf8);height:100%;border-radius:8px;transition:width .3s"></div>
        </div>
      </div>
      <p>显示文件名、已传/总大小、百分比，渐变进度条</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>C：按钮嵌入式</h3>
      <div style="padding:1rem">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div style="border:1px dashed var(--primary);border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px;background:var(--bg)">
            <span style="font-size:1.2rem">🎬</span>
            <span style="font-size:.8rem">demo.mp4 (45.2MB)</span>
            <span style="font-size:.75rem;color:var(--primary);font-weight:600">72%</span>
          </div>
        </div>
        <div style="margin-top:8px;display:flex;gap:4px">
          <div style="flex:1;height:4px;background:#e2e8f0;border-radius:2px">
            <div style="width:72%;background:var(--primary);height:100%;border-radius:2px"></div>
          </div>
        </div>
        <p style="margin-top:8px">进度显示在文件标签内部，适合同时上传多个文件</p>
      </div>
    </div>
  </div>
</div>

<p style="margin-top:2rem;font-size:.9rem;color:var(--text-muted)">点击卡片选中，选好后在终端告诉我你的选择</p>
