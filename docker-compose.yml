version: '3.8'

services:
  # ===== Infrastructure =====
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: blog-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio
    container_name: blog-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Microservices =====
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user
    container_name: blog-user
    ports:
      - "9094:9094"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supergaos_user?useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      JWT_SECRET: YourSuperSecretKeyForJWTTokenGeneration2026BlogSystem
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  comment-service:
    build:
      context: .
      dockerfile: Dockerfile.comment
    container_name: blog-comment
    ports:
      - "9092:9092"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supergaos_comment?useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  blog-service:
    build:
      context: .
      dockerfile: Dockerfile.blog
    container_name: blog-blog
    ports:
      - "9091:9091"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supergaos_blog?useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  file-service:
    build:
      context: .
      dockerfile: Dockerfile.file
    container_name: blog-file
    ports:
      - "9093:9093"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supergaos_file?useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: supergaos-images
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: blog-gateway
    ports:
      - "9090:9090"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      JWT_SECRET: YourSuperSecretKeyForJWTTokenGeneration2026BlogSystem
    depends_on:
      nacos:
        condition: service_healthy
      user-service:
        condition: service_started
      blog-service:
        condition: service_started
      comment-service:
        condition: service_started
      file-service:
        condition: service_started
    restart: unless-stopped

  # ===== Frontend =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: blog-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway-service
    restart: unless-stopped

volumes:
  mysql-data:
  minio-data:
