server:
  port: 9095

spring:
  application:
    name: supergaos-seckill
  datasource:
    url: jdbc:mysql://localhost:3306/supergaos_seckill?useUnicode=true&characterEncoding=utf-8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.supergaos.seckill.entity
